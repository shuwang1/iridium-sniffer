<!DOCTYPE html>
<html>
<head>
<title>IridiumView - Passive Presence Detection</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; color:#e0e0e0; font-family:'Courier New',monospace; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

.header {
    background:#16213e; padding:4px 12px; display:flex; justify-content:space-between;
    align-items:center; border-bottom:1px solid #0f3460; flex-shrink:0;
}
.header h1 { font-size:13px; color:#00d4ff; }
.hdr-status { color:#00ff88; font-size:10px; }
.hdr-dot { display:inline-block; width:6px; height:6px; background:#00ff88; border-radius:50%; margin-right:4px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.wrap { display:flex; flex:1; overflow:hidden; }

#map { flex:1; }

.sidebar {
    width:210px; background:#16213e; border-left:1px solid #0f3460;
    padding:6px; overflow-y:auto; display:flex; flex-direction:column; gap:4px;
    flex-shrink:0; font-size:9px;
}
.sb-title { font-size:8px; color:#555; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid #0f3460; padding-bottom:2px; margin-bottom:2px; }

.detect-box { background:#1a1a2e; border:1px solid #0f3460; border-radius:4px; padding:5px; text-align:center; }
.detect-class { font-size:18px; color:#ff6b6b; font-weight:bold; }
.detect-sub { font-size:8px; color:#888; }

.stat-row { display:flex; justify-content:space-between; padding:1px 0; }
.stat-k { color:#666; }
.stat-v { color:#00d4ff; }
.stat-v.red { color:#ff6b6b; }
.stat-v.grn { color:#00ff88; }
.stat-v.yel { color:#ffd93d; }

.sat-row { display:flex; justify-content:space-between; padding:1px 0; font-size:9px; }
.sat-id { color:#00d4ff; width:42px; }
.sat-inf { color:#888; }
.sat-snr { text-align:right; }
.snr-g { color:#00ff88; } .snr-m { color:#ffd93d; } .snr-l { color:#ff6b6b; }
.cal-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-left:3px; vertical-align:middle; }
.cal-y { background:#00ff88; } .cal-n { background:#444; }

.doppler-wrap { background:#1a1a2e; border:1px solid #0f3460; border-radius:4px; padding:4px; }
#doppler { width:100%; height:40px; display:block; }

.breath-box { background:#1a1a2e; border:1px solid #0f3460; border-radius:4px; padding:4px; text-align:center; }
.breath-hz { font-size:14px; color:#ff6b6b; }
.breath-bpm { font-size:8px; color:#666; }
.breath-wave { font-size:9px; color:#ff6b6b; animation:breathe 4s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:0.3} 50%{opacity:1} }

.log-box {
    flex:1; min-height:40px; background:#0d0d1a; border:1px solid #0f3460;
    border-radius:4px; padding:3px; overflow-y:auto; font-size:8px; color:#555;
}
.log-box .det { color:#ff6b6b; } .log-box .brth { color:#ffd93d; } .log-box .inf { color:#666; }

/* Leaflet overrides for dark theme */
.leaflet-container { background:#1a1a2e; }
.leaflet-control-attribution { font-size:7px !important; opacity:0.5; }
</style>
</head>
<body>

<div class="header">
    <h1>IRIDIUMVIEW v0.1.0-alpha</h1>
    <div class="hdr-status"><span class="hdr-dot"></span>DETECTING - 5 illuminators</div>
</div>

<div class="wrap">
    <div id="map"></div>
    <div class="sidebar">
        <div class="detect-box">
            <div class="detect-sub">CLASSIFICATION</div>
            <div class="detect-class" id="d-class">WALKING</div>
            <div class="detect-sub">confidence: <span id="d-conf">0.84</span> | occupants: <span id="d-cnt">1</span></div>
        </div>

        <div>
            <div class="sb-title">Status</div>
            <div class="stat-row"><span class="stat-k">CIR Updates</span><span class="stat-v grn" id="s-cir">12,847</span></div>
            <div class="stat-row"><span class="stat-k">Classifications</span><span class="stat-v" id="s-cls">641</span></div>
            <div class="stat-row"><span class="stat-k">Presence Events</span><span class="stat-v red" id="s-pres">38</span></div>
            <div class="stat-row"><span class="stat-k">Breathing Detects</span><span class="stat-v yel" id="s-brth">12</span></div>
        </div>

        <div>
            <div class="sb-title">Satellite Illuminators</div>
            <div id="sat-list"></div>
        </div>

        <div>
            <div class="sb-title">Micro-Doppler</div>
            <div class="doppler-wrap"><canvas id="doppler" width="198" height="40"></canvas></div>
        </div>

        <div>
            <div class="sb-title">Breathing</div>
            <div class="breath-box">
                <div class="breath-hz" id="b-hz">0.31 Hz</div>
                <div class="breath-wave">~ ~ ~ ~ ~ ~ ~ ~ ~</div>
                <div class="breath-bpm" id="b-bpm">~18.6 bpm</div>
            </div>
        </div>

        <div style="flex:1;display:flex;flex-direction:column;min-height:0;">
            <div class="sb-title">Event Log</div>
            <div class="log-box" id="log"></div>
        </div>
    </div>
</div>

<script>
// --- Map setup ---
var map = L.map('map',{zoomControl:false}).setView([33.9519, -83.3577], 20);
// Satellite imagery so the actual building is visible
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
    maxZoom:22, maxNativeZoom:19,
    attribution:'IridiumView | Esri'
}).addTo(map);

// Scan overlay on building (semi-transparent detection zone)
var bldg = L.polygon([
    [33.95200,-83.35800],[33.95200,-83.35755],
    [33.95192,-83.35755],[33.95192,-83.35740],
    [33.95180,-83.35740],[33.95180,-83.35800]
],{color:'#00d4ff',weight:1.5,fillColor:'#00d4ff',fillOpacity:0.08,dashArray:'6'}).addTo(map);

// Antenna marker (outside, by window)
L.circleMarker([33.95201,-83.35802],{radius:4,color:'#00d4ff',fillColor:'#00d4ff',fillOpacity:1,weight:1})
    .bindTooltip('SDR Antenna',{permanent:true,direction:'left',className:'',offset:[-8,0]}).addTo(map);

// Presence detection dot (moves around inside building)
var presenceDot = L.circleMarker([33.95192,-83.35780],{
    radius:10, color:'#ff6b6b', fillColor:'#ff4444', fillOpacity:0.5, weight:2
}).addTo(map);

var presenceGlow = L.circleMarker([33.95192,-83.35780],{
    radius:18, color:'#ff6b6b', fillColor:'#ff4444', fillOpacity:0.12, weight:0
}).addTo(map);

// Satellite illumination vectors (converging on building)
var satLines = [];
var satColors = ['#00d4ff','#00ff88','#ffd93d','#ff6b6b','#bb86fc'];
var satEndpoints = [
    [33.9526,-83.3588],[33.9526,-83.3562],
    [33.9510,-83.3578],[33.9528,-83.3570],
    [33.9512,-83.3592]
];
satEndpoints.forEach(function(ep,i){
    var line = L.polyline([ep,[33.95192,-83.35780]],{
        color:satColors[i],weight:0.5,opacity:0.25,dashArray:'3'
    }).addTo(map);
    satLines.push(line);
});

// Move presence dot within building bounds
var tLat = 33.95192, tLng = -83.35780;
var vLat = 0.0000008, vLng = 0.0000006;
function movePresence(){
    tLat += vLat + (Math.random()-0.5)*0.0000003;
    tLng += vLng + (Math.random()-0.5)*0.0000003;
    if(tLat>33.95199||tLat<33.95182) vLat*=-1;
    if(tLng>-83.35742||tLng<-83.35798) vLng*=-1;
    presenceDot.setLatLng([tLat,tLng]);
    presenceGlow.setLatLng([tLat,tLng]);
    // Update sat lines to point at presence
    satEndpoints.forEach(function(ep,i){
        satLines[i].setLatLngs([ep,[tLat,tLng]]);
    });
}
setInterval(movePresence,200);

// --- Satellites ---
var sats=[
    {id:'IRI-24',el:72.3,az:145.2,snr:18.4},
    {id:'IRI-51',el:58.1,az:234.7,snr:15.2},
    {id:'IRI-38',el:44.6,az:12.8,snr:12.8},
    {id:'IRI-67',el:31.2,az:298.1,snr:10.1},
    {id:'IRI-15',el:18.7,az:88.4,snr:7.3}
];
var sl=document.getElementById('sat-list');
sats.forEach(function(s){
    var sc=s.snr>14?'snr-g':s.snr>9?'snr-m':'snr-l';
    sl.innerHTML+='<div class="sat-row"><span class="sat-id">'+s.id+'</span><span class="sat-inf">'+s.el.toFixed(0)+'/'+s.az.toFixed(0)+'</span><span class="sat-snr '+sc+'">'+s.snr.toFixed(1)+'dB</span><span class="cal-dot cal-y"></span></div>';
});

// --- Doppler ---
var dc=document.getElementById('doppler');
var dx=dc.getContext('2d');
var dd=new Float32Array(100);
function drawDoppler(){
    for(var i=0;i<99;i++)dd[i]=dd[i+1];
    var t=Date.now()/1000;
    dd[99]=0.3+Math.sin(t*0.31*6.28)*0.12+Math.sin(t*1.7*6.28)*0.08+(Math.random()-0.5)*0.06;
    dx.fillStyle='#1a1a2e';dx.fillRect(0,0,198,40);
    dx.beginPath();dx.strokeStyle='#00d4ff';dx.lineWidth=1;
    for(var i=0;i<100;i++){var x=i*1.98,y=35-dd[i]*28;if(i===0)dx.moveTo(x,y);else dx.lineTo(x,y);}
    dx.stroke();
    dx.fillStyle='#333';dx.font='7px Courier New';
    dx.fillText('0Hz',1,39);dx.fillText('4Hz',175,39);
}
setInterval(drawDoppler,80);

// --- Stats ---
var cir=12847,cls=641,pres=38,brth=12;
function updStats(){
    cir+=Math.floor(Math.random()*12)+5;
    cls+=Math.random()<0.3?1:0;
    document.getElementById('s-cir').textContent=cir.toLocaleString();
    document.getElementById('s-cls').textContent=cls;
    document.getElementById('s-pres').textContent=pres;
    document.getElementById('s-brth').textContent=brth;
    var c=80+Math.floor(Math.random()*12);
    document.getElementById('d-conf').textContent='0.'+c;
    var bpm=17+Math.random()*3;
    document.getElementById('b-hz').textContent=(bpm/60).toFixed(2)+' Hz';
    document.getElementById('b-bpm').textContent='~'+bpm.toFixed(1)+' bpm';
    if(Math.random()<0.04){
        var cl=['WALKING','STATIONARY','SEATED'];
        var nc=cl[Math.floor(Math.random()*cl.length)];
        document.getElementById('d-class').textContent=nc;
        if(nc==='WALKING'){vLat=0.000001*(Math.random()>0.5?1:-1);vLng=0.0000008*(Math.random()>0.5?1:-1);}
        else{vLat=0;vLng=0;}
    }
}
setInterval(updStats,2000);

// --- Log ---
var logEl=document.getElementById('log');
var msgs=[
    ['inf','CIR baseline updated (5 illuminators)'],
    ['det','Presence: WALKING conf=0.84'],
    ['inf','IRI-15 el rising 18.7->19.2'],
    ['brth','Breathing: 0.31Hz (18.6bpm)'],
    ['inf','uDoppler energy=142.3'],
    ['det','Occupants: 1 (3-sat triangulation)'],
    ['inf','IRI-67 CIR delta +4.2dB'],
    ['det','STATIONARY -> WALKING'],
    ['brth','Breath conf: 7.8 (thr: 6.0)'],
    ['det','Movement 0.3m/s brg 215'],
];
var mi=0;
function addLog(){
    var ts=new Date().toTimeString().split(' ')[0];
    var m=msgs[mi%msgs.length];mi++;
    var d=document.createElement('div');
    d.innerHTML='<span style="color:#333">['+ts+']</span> <span class="'+m[0]+'">'+m[1]+'</span>';
    logEl.appendChild(d);logEl.scrollTop=1e6;
    if(logEl.children.length>30)logEl.removeChild(logEl.firstChild);
}
setInterval(addLog,3500);
for(var i=0;i<6;i++)addLog();
drawDoppler();
</script>
</body>
</html>
